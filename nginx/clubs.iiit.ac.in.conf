server {
        server_name clubs.iiit.ac.in;
        listen 80;

        access_log /var/log/nginx/clubs_access.log detailed;
        error_log /var/log/nginx/clubs_error.log warn;

        # Rate limiting for HTTP
        limit_req zone=general_limit burst=20 nodelay;
        #limit_conn conn_limit 10;

        location / {
                return 301 https://$host$request_uri;
        }
}

server {
        server_name clubs.iiit.ac.in;
        listen 443 ssl http2;

        access_log /var/log/nginx/clubs_access.log detailed;
        error_log /var/log/nginx/clubs_error.log warn;
        
        ssl_session_timeout 5m;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_certificate /etc/ssl/iiit.ac.in.pem;
        ssl_certificate_key /etc/ssl/iiit.ac.in.pem;
        ssl_stapling on;
        ssl_stapling_verify on;
        #add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        ## Rate limiting for HTTPS
        #limit_req zone=general_limit burst=50 nodelay;
        limit_req_status 429;
        ##limit_conn conn_limit 20;

        # Custom error page for rate limit
        error_page 429 /429.html;
        location = /429.html {
                internal;
                return 429 "Rate limit exceeded. Please try again later.\n";
                add_header Content-Type text/plain;
        }

        location ~ ^/astronautics(/|$) {
                proxy_pass http://astronautics;

                # Stricter rate limiting for astronautics path
                #limit_req zone=strict_limit burst=10 nodelay;
                limit_req zone=general_limit burst=50 nodelay;

                # Additional headers to help NextJS understand the base path
                proxy_set_header X-Forwarded-Prefix /astronautics;
                proxy_set_header X-Original-URI $request_uri;
                proxy_set_header X-Forwarded-Host $proxy_x_forwarded_host;
                add_header Last-Modified $date_gmt;
                add_header Cache-Control 'no-store, no-cache';
                if_modified_since off;
                expires off;
                etag off;
        }

        # Exclude /_next from rate limiting (Next.js static assets)
        location /_next/ {
            proxy_pass http://clubs;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $proxy_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Optional: Add caching for better performance
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Main location with rate limiting
        location / {
            # Apply rate limiting here
            limit_req zone=general_limit burst=50 nodelay;
            #limit_conn conn_limit 15;

            proxy_pass http://clubs;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $proxy_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
}
