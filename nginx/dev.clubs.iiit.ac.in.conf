server {
        server_name dev-clubs.iiit.ac.in;
        listen 80;

        access_log /var/log/nginx/dev_clubs_access.log detailed;
        error_log /var/log/nginx/dev_clubs_error.log warn;

        # Rate limiting on HTTP (before redirect)
        limit_req zone=general_limit burst=20 nodelay;
        #limit_conn conn_limit 15;

        location / {
                return 301 https://$host$request_uri;
        }
}

server {
        server_name dev-clubs.iiit.ac.in;
        listen 443 ssl http2;

        access_log /var/log/nginx/dev_clubs_access.log detailed;
        error_log /var/log/nginx/dev_clubs_error.log warn;
        
        ssl_session_timeout 5m;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_certificate /etc/ssl/iiit.ac.in.pem;
        ssl_certificate_key /etc/ssl/iiit.ac.in.pem;
        ssl_stapling on;
        ssl_stapling_verify on;
        add_header Strict-Transport-Security "max-age=31536000" always;

        ## Global rate limiting for HTTPS
        #limit_req zone=general_limit burst=50 nodelay;
        ##limit_conn conn_limit 15;
        limit_req_status 429;

        # Custom error page for rate limit hits
        error_page 429 /429.html;
        location = /429.html {
                internal;
                return 429 "Rate limit exceeded. Please try again later.\n";
                add_header Content-Type text/plain;
        }

        # Exclude /_next from rate limiting (Next.js static assets)
        location /_next/ {
            proxy_pass http://dev-clubs;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $proxy_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Optional: Add caching for better performance
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Main location with rate limiting
        location / {
            # Apply rate limiting here
            limit_req zone=general_limit burst=50 nodelay;
            #limit_conn conn_limit 15;

            proxy_pass http://dev-clubs;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $proxy_x_forwarded_host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
}
